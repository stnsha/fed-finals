<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farish | Creative Programmer</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Island+Moments&family=Jockey+One&display=swap" rel="stylesheet">
</head>
<body>

    <div class="cursor-follower"></div>
    <div class="blob"></div>

    <header>
        <a href="#" class="logo">F</a>
        <nav>
            <a href="#home" class="nav-link">Home</a>
            <a href="#about" class="nav-link">About</a>
            <a href="#projects" class="nav-link">Work</a>
        </nav>
    </header>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1 class="reveal-text">FARISH</h1>
            <p>Always Fresh • Creative Programmer</p>
            <a href="#projects" class="btn-folio">Explore Folio</a>
        </div>
        
        <div class="hero-image-container">
            <img src="assets/profile.jpeg" alt="Profile" class="img-profile">
            <img src="assets/silhouette.png" alt="Silhouette" class="img-silhouette">
            <div class="hover-hint">Hover to Reveal</div>
        </div>
    </section>

    <section class="about" id="about">
        <div class="about-container">
            <h2 class="about-title">DIGITAL<br>CRAFTSMAN</h2>
            <div class="about-card">
                <p>I’m a sixteen-year-old developer bridging the gap between <span class="highlight">bold creativity</span> and <span class="highlight">functional code</span>.</p>
            </div>
        </div>
    </section>

    <div class="img-break">
        <img src="assets/intro.png" alt="Intro Visual" class="scroll-zoom">
    </div>

    <section class="projects" id="projects">
        <h2 class="section-header">SELECTED PROJECTS</h2>
        <div class="grid" id="project-grid">
            <!-- Projects injected by script.js -->
        </div>
    </section>

    <div class="img-break">
        <img src="assets/fact.png" alt="Fact Image" class="scroll-reveal-img">
    </div>

    <script src="static/script.js"></script>
</body>
</html>
